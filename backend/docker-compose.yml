services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_net

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Trong mạng Docker chỉ dùng tên service và cổng nội bộ, không dùng localhost / port map máy host
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # Đồng bộ code (và .env nếu có trên host) với container — uvicorn --reload trong Dockerfile sẽ bắt thay đổi
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  postgres_data:
