name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Import FastAPI app & export OpenAPI without a real Postgres instance
  DATABASE_URL: postgresql+asyncpg://ci:ci@127.0.0.1:5432/ci

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            ci:
              - '.github/workflows/**'

  backend:
    name: Backend (Poetry)
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      # Python 3.13 trước (runner mặc định là 3.12; pyproject yêu cầu >=3.13)
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Không dùng cache: poetry trên setup-python — cần Poetry đã cài sẵn, dễ lỗi PATH.
      # Cài Poetry bằng pip của đúng Python vừa setup → poetry luôn gọi được.
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install "poetry==2.1.1"

      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install --no-interaction

      - name: Import application
        run: poetry run python -c "from src.main import app; assert app.title == 'Notes API'"

      - name: Byte-compile sources
        run: poetry run python -m compileall -q src

      - name: Export OpenAPI schema
        run: |
          poetry run python -m src.export_openapi /tmp/openapi-ci.json
          poetry run python -c "import json; json.load(open('/tmp/openapi-ci.json'))"

  frontend:
    name: Frontend (pnpm)
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
